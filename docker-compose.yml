version: "3.9"

# Local demo: Hardhat node + admin app + branch app, all pointing at chainId 31337.
#
# Usage:
#   1. docker compose --env-file .env.hardhat up hardhat-node -d
#   2. pnpm deploy:local          (prints NEXT_PUBLIC_BRANCH_ADDRESS — paste into .env.hardhat)
#   3. docker compose --env-file .env.hardhat up --build admin branch

services:
  hardhat-node:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm --filter @zadanie-defi/contracts run node"
    volumes:
      - .:/app
    ports:
      - "8545:8545"

  admin:
    build:
      context: .
      dockerfile: packages/admin/Dockerfile
      args:
        NEXT_PUBLIC_CHAIN_ID: "31337"
        NEXT_PUBLIC_RPC_URL: "http://hardhat-node:8545"
    ports:
      - "3000:3000"
    depends_on:
      - hardhat-node

  branch:
    build:
      context: .
      dockerfile: packages/branch/Dockerfile
      args:
        NEXT_PUBLIC_CHAIN_ID: "31337"
        NEXT_PUBLIC_RPC_URL: "http://hardhat-node:8545"
        NEXT_PUBLIC_BRANCH_ADDRESS: "${NEXT_PUBLIC_BRANCH_ADDRESS}"
        NEXT_PUBLIC_BRANCH_NAME: "${NEXT_PUBLIC_BRANCH_NAME:-GymFinder}"
    ports:
      - "3001:3001"
    environment:
      - OPERATOR_PRIVATE_KEY=${OPERATOR_PRIVATE_KEY}
      - OPERATOR_PIN_HASH=${OPERATOR_PIN_HASH}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - hardhat-node
